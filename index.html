<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZICELLE | Coming Soon</title>
    <!-- Google Fonts for Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #031133; /* Deep luxury navy inspired by 1000008356.png */
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --accent-gold: #d4af37; /* Subtle luxury gold accent */
            --font-serif: 'Cinzel', serif;
            --font-sans: 'Montserrat', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-sans);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        /* Premium Ambient Background Animation */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212,175,55,0.05) 0%, rgba(3,17,51,0) 70%);
            animation: ambientFloat 20s infinite linear;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes ambientFloat {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Navigation Header */
        header {
            width: 100%;
            max-width: 1200px;
            padding: 40px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            opacity: 0;
            animation: fadeInDown 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .header-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            flex-grow: 1;
            margin: 0 30px;
        }

        .brand-status {
            font-size: 0.75rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--accent-gold);
            font-weight: 600;
        }

        /* Main Content Hero */
        main {
            max-width: 800px;
            padding: 20px;
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }

        /* Container for 1000008356.png Logo */
        .logo-container {
            width: 130px;
            height: 130px;
            margin-bottom: 35px;
            opacity: 0;
            transform: scale(0.9);
            animation: fadeInScale 1.8s cubic-bezier(0.25, 1, 0.5, 1) 0.3s forwards;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Decorative ring around the logo image */
        .logo-container::after {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 50%;
            animation: spin 30s linear infinite;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
            display: block;
        }

        /* Elegant typographic fallback if the image path is broken */
        .logo-fallback {
            display: none;
            font-family: var(--font-serif);
            font-size: 2.2rem;
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.15);
            width: 100%;
            height: 100%;
            border-radius: 16px;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.02);
            letter-spacing: 2px;
        }

        .brand-title {
            font-family: var(--font-serif);
            font-size: 3.5rem;
            font-weight: 400;
            letter-spacing: 0.25em;
            margin-bottom: 20px;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1.5s cubic-bezier(0.25, 1, 0.5, 1) 0.6s forwards;
        }

        .tagline {
            font-size: 1rem;
            font-weight: 200;
            letter-spacing: 0.4em;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 40px;
            max-width: 600px;
            line-height: 1.8;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1.5s cubic-bezier(0.25, 1, 0.5, 1) 0.9s forwards;
        }

        /* Exclusive Privilege Notification Form */
        .notify-form {
            width: 100%;
            max-width: 450px;
            display: flex;
            position: relative;
            opacity: 0;
            transform: translateY(15px);
            animation: fadeInUp 1.5s cubic-bezier(0.25, 1, 0.5, 1) 1.2s forwards;
        }

        .email-input {
            width: 100%;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-right: none;
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            transition: all 0.4s ease;
        }

        .email-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(212, 175, 55, 0.5);
        }

        .submit-btn {
            padding: 0 32px;
            background: var(--text-primary);
            border: 1px solid var(--text-primary);
            color: var(--bg-color);
            font-family: var(--font-sans);
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .submit-btn:hover {
            background: transparent;
            color: var(--text-primary);
            border-color: var(--text-primary);
        }

        /* Footer Details */
        footer {
            width: 100%;
            max-width: 1200px;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            z-index: 10;
            opacity: 0;
            animation: fadeIn 2s ease 1.5s forwards;
        }

        /* Animation Keyframes */
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* Responsive Design Adjustments */
        @media (max-width: 768px) {
            .brand-title { font-size: 2.5rem; letter-spacing: 0.15em; }
            .tagline { font-size: 0.85rem; letter-spacing: 0.25em; }
            .header-line { display: none; }
        }
    </style>
</head>
<body>

    <!-- Header Navigation Section -->
    <header>
        <div class="brand-status">Est. 2026</div>
        <div class="header-line"></div>
        <div class="brand-status">Private Collection</div>
    </header>

    <!-- Main Dynamic Teaser Section -->
    <main>
        <!-- Luxury Brand Logo Frame referencing 1000008356.png -->
        <div class="logo-container">
            <img src="1000008356.png" alt="Zicelle Monogram" class="logo-img" id="brandLogo" onerror="handleImageError()">
            <div class="logo-fallback" id="logoFallback">Z</div>
        </div>

        <h1 class="brand-title">Zicelle</h1>
        <p class="tagline">An uncompromising vision of luxury. Shaping the definition of modern elegance.</p>

        <!-- Exclusive Access Notification Sign-up -->
        <form class="notify-form" onsubmit="event.preventDefault(); alert('You have been granted early access updates.');">
            <input type="email" class="email-input" placeholder="Enter your email for private entry" required>
            <button type="submit" class="submit-btn">Notify</button>
        </form>
    </main>

    <!-- Footer Identity -->
    <footer>
        &copy; 2026 Zicelle. All Rights Reserved. By invitation only.
    </footer>

    <script>
        function handleImageError() {
            // Hides the broken image icon and displays a premium letter monogram instead
            document.getElementById('brandLogo').style.display = 'none';
            document.getElementById('logoFallback').style.display = 'flex';
        }
    </script>
</body>
</html>
