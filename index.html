<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZICELLE | Vampire Blood</title>
    <!-- Google Fonts for Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #031133; /* Deep luxury navy inspired by 1000008356.png */
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --accent-gold: #d4af37; /* Subtle luxury gold accent */
            --vampire-crimson: #800020; /* Deep crimson accent for Vampire Blood */
            --font-serif: 'Cinzel', serif;
            --font-sans: 'Montserrat', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-sans);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        /* Premium Ambient Background Animation with Crimson Tones */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(128, 0, 32, 0.12) 0%, rgba(3,17,51,0) 75%);
            animation: ambientFloat 25s infinite linear;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes ambientFloat {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Navigation Header */
        header {
            width: 100%;
            max-width: 1200px;
            padding: 40px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            opacity: 0;
            animation: fadeInDown 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .header-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            flex-grow: 1;
            margin: 0 30px;
        }

        .brand-status {
            font-size: 0.75rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--accent-gold);
            font-weight: 600;
        }

        /* Main Content Hero */
        main {
            max-width: 900px;
            padding: 40px 20px;
            text-align: center;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }

        /* Container for 1000008356.png Logo */
        .logo-container {
            width: 90px;
            height: 90px;
            margin-bottom: 25px;
            opacity: 0;
            transform: scale(0.9);
            animation: fadeInScale 1.8s cubic-bezier(0.25, 1, 0.5, 1) 0.3s forwards;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Decorative thin ring around the logo image */
        .logo-container::after {
            content: '';
            position: absolute;
            top: -6px;
            left: -6px;
            right: -6px;
            bottom: -6px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 50%;
            animation: spin 40s linear infinite;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            display: block;
        }

        .logo-fallback {
            display: none;
            font-family: var(--font-serif);
            font-size: 1.8rem;
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.15);
            width: 100%;
            height: 100%;
            border-radius: 12px;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.02);
        }

        /* Product Presentation Layout */
        .product-showcase {
            margin-top: 10px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1.5s cubic-bezier(0.25, 1, 0.5, 1) 0.6s forwards;
        }

        .product-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            color: var(--accent-gold);
            margin-bottom: 10px;
            display: block;
            font-weight: 600;
        }

        .brand-title {
            font-family: var(--font-serif);
            font-size: 3.8rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            line-height: 1.1;
            background: linear-gradient(180deg, #ffffff 0%, rgba(255,255,255,0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .product-name {
            font-family: var(--font-serif);
            font-size: 1.8rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #f2e6e6;
            margin: 15px 0 25px 0;
            font-weight: 400;
            text-shadow: 0 0 20px rgba(128, 0, 32, 0.6);
        }

        .tagline {
            font-size: 0.95rem;
            font-weight: 200;
            letter-spacing: 0.25em;
            color: var(--text-secondary);
            margin: 0 auto 45px auto;
            max-width: 600px;
            line-height: 1.8;
        }

        /* Premium Luxury Order Button */
        .order-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 18px 44px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.8);
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .order-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: all 0.6s ease;
        }

        .order-btn:hover::before {
            left: 100%;
        }

        .order-btn:hover {
            color: #031133;
            background: var(--text-primary);
            border-color: var(--text-primary);
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(255, 255, 255, 0.1);
        }

        /* Footer Details */
        footer {
            width: 100%;
            max-width: 1200px;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            z-index: 10;
            opacity: 0;
            animation: fadeIn 2s ease 1.2s forwards;
        }

        /* Animation Keyframes */
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* Responsive Design Adjustments */
        @media (max-width: 768px) {
            .brand-title { font-size: 2.6rem; letter-spacing: 0.1em; }
            .product-name { font-size: 1.3rem; letter-spacing: 0.2em; }
            .tagline { font-size: 0.8rem; letter-spacing: 0.18em; }
            .header-line { display: none; }
            .order-btn { padding: 16px 36px; width: 100%; max-width: 320px; }
        }
    </style>
</head>
<body>

    <!-- Header Navigation Section -->
    <header>
        <div class="brand-status">Est. 2026</div>
        <div class="header-line"></div>
        <div class="brand-status">Signature Edition</div>
    </header>

    <!-- Main Dynamic Teaser Section -->
    <main>
        <!-- Luxury Brand Logo Frame referencing 1000008356.png -->
        <div class="logo-container">
            <img src="1000008356.png" alt="Zicelle Monogram" class="logo-img" id="brandLogo" onerror="handleImageError()">
            <div class="logo-fallback" id="logoFallback">Z</div>
        </div>

        <!-- Product Showcase Section -->
        <div class="product-showcase">
            <span class="product-tag">The First Reveal</span>
            <h1 class="brand-title">Zicelle</h1>
            <h2 class="product-name">Vampire Blood</h2>
            
            <p class="tagline">
                An intoxicating blend of deep dark mystery and velvet sophistication. 
                Crafted for those who leave an unforgettable impression in the dark.
            </p>

            <!-- Direct Instant Order Access Button to WhatsApp -->
            <a href="https://wa.me/8801882343923?text=Hello%20Zicelle,%20I%20would%20like%20to%20order%20the%20Vampire%20Blood%20Perfume." 
               target="_blank" 
               class="order-btn">
               Purchase Via WhatsApp
            </a>
        </div>
    </main>

    <!-- Footer Identity -->
    <footer>
        &copy; 2026 Zicelle Haute Parfumerie. All Rights Reserved.
    </footer>

    <script>
        function handleImageError() {
            document.getElementById('brandLogo').style.display = 'none';
            document.getElementById('logoFallback').style.display = 'flex';
        }
    </script>
</body>
</html>
